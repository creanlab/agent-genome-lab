<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:#1a1d23;
  color:#c8cad0;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
}

.card{
  width:1080px;height:1080px;
  background:linear-gradient(165deg,#1e2128 0%,#181b20 50%,#1a1d23 100%);
  border-radius:0;
  padding:56px 60px 44px;
  display:flex;flex-direction:column;
  position:relative;
  overflow:hidden;
}

/* Subtle top accent line */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#5b7a8a,#7a8f7a,#8a7a6a);
  opacity:.6;
}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px}
.hdr-left h1{font-size:26px;font-weight:700;color:#d8dbe0;letter-spacing:-.02em}
.hdr-left p{font-size:12.5px;color:#6b7280;margin-top:4px;font-weight:400}
.hdr-right{text-align:right}
.hdr-right .period{font-size:12px;color:#6b7280;font-weight:500}
.hdr-right .org{font-size:11px;color:#505660;margin-top:3px}

/* METRICS ROW */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:32px}
.metric{
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.05);
  border-radius:10px;padding:16px 14px;
}
.metric .num{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:#d0d4da;line-height:1}
.metric .lbl{font-size:10px;color:#5a5f6b;text-transform:uppercase;letter-spacing:.08em;margin-top:6px;font-weight:500}

/* CHART AREA */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0}

.chart-box{
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.04);
  border-radius:10px;padding:18px 16px 14px;
  display:flex;flex-direction:column;
}
.chart-box .title{font-size:10.5px;color:#5a5f6b;text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:12px}

/* BAR CHART */
.bar-area{flex:1;display:flex;align-items:flex-end;gap:1px;position:relative;min-height:0}
.bar{border-radius:2px 2px 0 0;min-width:3px;flex:1;transition:height .4s;position:relative}
.bar:hover{opacity:1!important}
.bar .tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#0d0f12;border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:3px 7px;font-size:9px;white-space:nowrap;z-index:10;color:#9ca3af}
.bar:hover .tip{display:block}

/* HEATMAP */
.heatmap-wrap{flex:1;display:flex;flex-direction:column;justify-content:center}
.hm-grid{display:flex;flex-direction:column;gap:2px}
.hm-row{display:flex;gap:2px}
.hm-cell{width:11px;height:11px;border-radius:2px;background:rgba(255,255,255,.03)}
.hm-cell.h1{background:rgba(120,145,130,.25)}
.hm-cell.h2{background:rgba(120,145,130,.45)}
.hm-cell.h3{background:rgba(120,145,130,.65)}
.hm-cell.h4{background:rgba(120,145,130,.85)}
.hm-labels{display:flex;gap:2px;margin-top:6px}
.hm-labels span{font-size:8px;color:#4a4f5a}

/* TIMELINE */
.tl-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;gap:8px}
.tl-row{display:flex;align-items:center;gap:10px;height:22px}
.tl-name{width:120px;font-size:10.5px;color:#7a7f8a;font-weight:500;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-track{flex:1;position:relative;height:100%}
.tl-dot{position:absolute;border-radius:50%;top:50%;transform:translate(-50%,-50%);opacity:.75}
.tl-count{font-family:'JetBrains Mono',monospace;font-size:9px;color:#4a4f5a;width:30px;text-align:right}
.tl-months{display:flex;margin-left:130px;padding-right:30px;margin-top:4px}
.tl-months span{flex:1;text-align:center;font-size:8px;color:#3a3f4a}

/* REPOS LIST */
.repo-list{flex:1;display:flex;flex-direction:column;justify-content:center;gap:6px}
.repo-item{display:flex;align-items:center;gap:10px;padding:7px 10px;background:rgba(255,255,255,.015);border-radius:6px;border:1px solid rgba(255,255,255,.03)}
.repo-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.repo-name{font-size:11px;color:#8a8f9a;font-weight:500;flex:1}
.repo-commits{font-family:'JetBrains Mono',monospace;font-size:10px;color:#5a5f6b}
.repo-type{font-size:8px;color:#3f434d;text-transform:uppercase;letter-spacing:.06em}

/* FOOTER */
.ftr{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:20px;border-top:1px solid rgba(255,255,255,.04)}
.ftr-left{font-size:10px;color:#3f434d;letter-spacing:.02em}
.ftr-right{font-size:10px;color:#3f434d}
.ftr a{color:#5a6570;text-decoration:none}

/* REPO COLORS - muted pastel */
.c-nve{color:#7a9aaa}
.c-tama{color:#7a9a7d}
.c-agl{color:#9a7a7d}
.c-docs{color:#9a917a}
.c-zero{color:#7a7a9a}
</style>
</head>

me": "12:28:27", "author": "Antigravity Agent", "msg": "Add deploy package download endpoint and contract updates"}, {"repo": "NVE-beta", "hash": "4b2a1754", "date": "2026-02-08", "time": "05:23:31", "author": "Antigravity Agent", "msg": "Add project events feed and notification dispatch skeleton"}, {"repo": "NVE-beta", "hash": "72c49112", "date": "2026-02-08", "time": "05:21:18", "author": "Antigravity Agent", "msg": "Add SONAR cache and ranking drift detection endpoints"}, {"repo": "NVE-beta", "hash": "63bb811a", "date": "2026-02-08", "time": "05:17:49", "author": "Antigravity Agent", "msg": "Add deploy package zip flow and multi-tenant RLS migration"}, {"repo": "NVE-beta", "hash": "3cec252d", "date": "2026-02-08", "time": "05:10:07", "author": "Antigravity Agent", "msg": "Add AI Readability Compiler v1 and compile endpoint"}, {"repo": "NVE-beta", "hash": "5ce4e482", "date": "2026-02-08", "time": "05:08:10", "author": "Antigravity Agent", "msg": "Add Claim Consistency Guard v1 and content generation API"}, {"repo": "NVE-beta", "hash": "3842a490", "date": "2026-02-08", "time": "05:06:16", "author": "Antigravity Agent", "msg": "Add Source Influence Graph v1 with SONAR persistence tables"}, {"repo": "NVE-beta", "hash": "3c4eb29a", "date": "2026-02-08", "time": "05:03:37", "author": "Antigravity Agent", "msg": "Implement Sprint 1 backend skeleton with Supabase schema and docs sync"}, {"repo": "NVE-beta", "hash": "0518d2eb", "date": "2026-02-08", "time": "04:40:30", "author": "Antigravity Agent", "msg": "Finalize VECTORY brand decision across core strategy docs"}, {"repo": "NVE-beta", "hash": "ff63483e", "date": "2026-02-08", "time": "04:37:57", "author": "Antigravity Agent", "msg": "Add Vectory hero concepts and ready-to-use handoff snapshot"}, {"repo": "NVE-beta", "hash": "59430e4b", "date": "2026-02-08", "time": "03:33:56", "author": "Antigravity Agent", "msg": "Refine branding direction and add new-session handoff brief"}, {"repo": "NVE-beta", "hash": "2c8ed8d5", "date": "2026-02-08", "time": "03:21:34", "author": "Antigravity Agent", "msg": "Deepen module docs, add branding options, and align roadmap decisions"}, {"repo": "NVE-beta", "hash": "19e43c3f", "date": "2026-02-08", "time": "02:56:18", "author": "Antigravity Agent", "msg": "Expand technical docs with full module specs and master checklist"}, {"repo": "NVE-beta", "hash": "dc519182", "date": "2026-02-08", "time": "02:14:53", "author": "Antigravity Agent", "msg": "Align strategy docs with aggressive all-in execution mode"}, {"repo": "NVE-beta", "hash": "e8dfe469", "date": "2026-02-08", "time": "01:54:22", "author": "Antigravity Agent", "msg": "Add canonical strategy and frontend documentation structure"}, {"repo": "NVE-beta", "hash": "a57e2671", "date": "2026-02-07", "time": "21:04:09", "author": "Antigravity Agent", "msg": "Stabilize config-driven core and refresh RU planning docs"}, {"repo": "NVE-beta", "hash": "1a8d3f91", "date": "2026-02-07", "time": "16:37:41", "author": "Antigravity Agent", "msg": "Inject Scientific Research (RAID, AIVO, llms.txt) into plans"}, {"repo": "NVE-beta", "hash": "4553c712", "date": "2026-02-07", "time": "15:26:00", "author": "Antigravity Agent", "msg": "Competitor Analysis and Strategy Update"}, {"repo": "NVE-beta", "hash": "bba7ce2f", "date": "2026-02-07", "time": "14:54:51", "author": "Antigravity Agent", "msg": "Initial commit (NVE-beta baseline)"}];

const COLORS = {
  'NVE-beta': '#7a9aaa',
  'evolution-tamagotchi': '#7a9a7d',
  'agent-genome-lab': '#9a7a7d',
  'documentationai-Docs': '#9a917a',
  'zero': '#7a7a9a'
};

const repos = [...new Set(COMMITS.map(c => c.repo))];
const dates = [...new Set(COMMITS.map(c => c.date))].sort();
const allDates = [];
const d1 = new Date(dates[0]), d2 = new Date(dates[dates.length-1]);
for (let d = new Date(d1); d <= d2; d.setDate(d.getDate()+1)) allDates.push(d.toISOString().slice(0,10));

const daily = {};
allDates.forEach(d => { daily[d] = {}; repos.forEach(r => daily[d][r] = 0); });
COMMITS.forEach(c => { if(daily[c.date]) daily[c.date][c.repo]++; });

// METRICS
const weekSet = new Set(COMMITS.map(c => {
  const d = new Date(c.date); const jan1 = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d - jan1) / 86400000) + jan1.getDay() + 1) / 7);
}));
const streak = (() => {
  let max = 0, cur = 0;
  allDates.forEach(d => {
    const cnt = Object.values(daily[d]).reduce((s,v) => s+v, 0);
    if (cnt > 0) { cur++; max = Math.max(max, cur); } else cur = 0;
  });
  return max;
})();

document.getElementById('metrics').innerHTML = [
  { n: COMMITS.length, l: 'Commits' },
  { n: dates.length, l: 'Active Days' },
  { n: repos.length + 3, l: 'Repositories' },
  { n: streak, l: 'Day Streak' },
  { n: weekSet.size, l: 'Active Weeks' }
].map(m => `<div class="metric"><div class="num">${m.n}</div><div class="lbl">${m.l}</div></div>`).join('');

// BAR CHART
const maxD = Math.max(...allDates.map(d => Object.values(daily[d]).reduce((s,v)=>s+v,0)));
const barArea = document.getElementById('barArea');
allDates.forEach(date => {
  const total = Object.values(daily[date]).reduce((s,v)=>s+v,0);
  const bar = document.createElement('div');
  bar.className = 'bar';
  const h = total > 0 ? Math.max(3, (total / maxD) * 100) : 0;
  bar.style.height = h + '%';
  // pick dominant repo color
  let maxRepo = repos[0], maxC = 0;
  repos.forEach(r => { if((daily[date][r]||0) > maxC) { maxC = daily[date][r]; maxRepo = r; } });
  bar.style.background = total > 0 ? COLORS[maxRepo] || '#5a6570' : 'rgba(255,255,255,.03)';
  bar.style.opacity = total > 0 ? (.4 + (total/maxD) * .6) : 1;
  if (total > 0) {
    const tip = document.createElement('div');
    tip.className = 'tip';
    tip.textContent = date.slice(5) + ': ' + total;
    bar.appendChild(tip);
  }
  barArea.appendChild(bar);
});

// HEATMAP
const heatWrap = document.getElementById('heatWrap');
const heatStart = new Date(dates[0]);
heatStart.setDate(heatStart.getDate() - heatStart.getDay());
const heatEnd = new Date(dates[dates.length-1]);
const weeks = []; let wd = [];
for (let d = new Date(heatStart); d <= heatEnd; d.setDate(d.getDate()+1)) {
  const ds = d.toISOString().slice(0,10);
  const cnt = COMMITS.filter(c => c.date === ds).length;
  wd.push({ date: ds, count: cnt });
  if (wd.length === 7) { weeks.push(wd); wd = []; }
}
if (wd.length) weeks.push(wd);

const grid = document.createElement('div');
grid.className = 'hm-grid';
for (let day = 0; day < 7; day++) {
  const row = document.createElement('div');
  row.className = 'hm-row';
  weeks.forEach(w => {
    if (w[day]) {
      const cell = document.createElement('div');
      cell.className = 'hm-cell';
      cell.title = w[day].date + ': ' + w[day].count;
      const c = w[day].count;
      if (c >= 15) cell.classList.add('h4');
      else if (c >= 8) cell.classList.add('h3');
      else if (c >= 3) cell.classList.add('h2');
      else if (c >= 1) cell.classList.add('h1');
      row.appendChild(cell);
    }
  });
  grid.appendChild(row);
}
heatWrap.appendChild(grid);

// TIMELINE
const tlWrap = document.getElementById('tlWrap');
const allRepos = ['NVE-beta', 'evolution-tamagotchi', 'agent-genome-lab', 'documentationai-Docs', 'zero'];
allRepos.forEach(repo => {
  const count = COMMITS.filter(c => c.repo === repo).length;
  const row = document.createElement('div');
  row.className = 'tl-row';
  row.innerHTML = `<div class="tl-name">${repo}</div>`;
  const track = document.createElement('div');
  track.className = 'tl-track';
  allDates.forEach((date, i) => {
    const c = daily[date]?.[repo] || 0;
    if (c > 0) {
      const dot = document.createElement('div');
      dot.className = 'tl-dot';
      const sz = Math.max(4, Math.min(14, c * 3));
      dot.style.width = sz + 'px';
      dot.style.height = sz + 'px';
      dot.style.left = (i / allDates.length * 100) + '%';
      dot.style.background = COLORS[repo] || '#5a6570';
      dot.title = date + ': ' + c;
      track.appendChild(dot);
    }
  });
  row.appendChild(track);
  row.innerHTML += `<div class="tl-count">${count}</div>`;
  tlWrap.appendChild(row);
});
// months
const mAxis = document.createElement('div');
mAxis.className = 'tl-months';
const ms = {};
allDates.forEach((d,i) => { const m = d.slice(0,7); if(!ms[m]) ms[m]=i; });
Object.keys(ms).forEach(m => {
  const sp = document.createElement('span');
  sp.textContent = new Date(m+'-01').toLocaleDateString('en',{month:'short'});
  mAxis.appendChild(sp);
});
tlWrap.appendChild(mAxis);

// REPOS
const repoList = document.getElementById('repoList');
[
  { name: 'NVE-beta', commits: 485, type: 'private', color: COLORS['NVE-beta'] },
  { name: 'evolution-tamagotchi', commits: 49, type: 'private', color: COLORS['evolution-tamagotchi'] },
  { name: 'agent-genome-lab', commits: '---', type: 'public', color: COLORS['agent-genome-lab'] },
  { name: 'documentationai-Docs', commits: '---', type: 'public', color: COLORS['documentationai-Docs'] },
  { name: 'zero', commits: '---', type: 'public', color: COLORS['zero'] }
].forEach(r => {
  const el = document.createElement('div');
  el.className = 'repo-item';
  el.innerHTML = `<div class="repo-dot" style="background:${r.color}"></div>
    <div class="repo-name">${r.name}</div>
    <div class="repo-commits">${r.commits}</div>
    <div class="repo-type">${r.type}</div>`;
  repoList.appendChild(el);
});
</script>
